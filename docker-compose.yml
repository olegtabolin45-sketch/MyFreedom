# Поднимает приложение + PostgreSQL одной командой:
#   docker compose up -d --build
#
# Требует файл .env с JWT_SECRET (см. .env.example).
# Trino/Iceberg для аналитики разворачиваются отдельно (этап 4 ROADMAP).

services:
  db:
    image: postgres:16-alpine
    container_name: aeterna-db
    environment:
      POSTGRES_USER: ${DB_USER:-aeterna}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aeterna_local_pwd}
      POSTGRES_DB: ${DB_NAME:-aeterna}
    ports:
      - "5433:5432"
    volumes:
      - aeterna_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aeterna} -d ${DB_NAME:-aeterna}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aeterna-redis
    # Сохраняем refresh-токены между перезапусками (appendonly)
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - aeterna_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: aeterna-app
    environment:
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://127.0.0.1:8000,http://localhost:8000}
      # Внутри docker-сети ходим к сервису db по имени и внутреннему порту 5432
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-aeterna}
      DB_USER: ${DB_USER:-aeterna}
      DB_PASSWORD: ${DB_PASSWORD:-aeterna_local_pwd}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    # Сначала применяем миграции Alembic, затем запускаем приложение
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  aeterna_pgdata:
  aeterna_redisdata:
